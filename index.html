<script>
document.addEventListener("DOMContentLoaded", async function() {
    const API_KEY = "d8cos1hr01qt0j1ho5k0d8cos1hr01qt0j1ho5kg"; 
    
    // 找出所有帶有 data-symbol 的標籤
    const tags = document.querySelectorAll('span[data-symbol]');
    const symbols = [...new Set(Array.from(tags).map(t => t.dataset.symbol.toUpperCase()))];
    
    if (!symbols.length) return;

    // 並行抓取所有股價
    const results = await Promise.all(symbols.map(s => 
        fetch(`https://finnhub.io/api/v1/quote?symbol=${s}&token=${API_KEY}`)
        .then(res => res.json())
        .then(data => ({s, data}))
        .catch(err => ({s, data: null}))
    ));

    // 根據漲跌動態更新 UI 顏色與價格
    results.forEach(({s, data}) => {
        if (data && typeof data.c !== 'undefined') {
            const price = data.c.toFixed(2);
            const dp = data.dp; // 漲跌幅百分比
            
            // 決定顏色與箭頭 (台股習慣：紅漲、綠跌、橘平盤)
            let diffArrow = "-";
            let bgColor = "#f39c12"; // 平盤橘黃色
            
            if (dp > 0) {
                diffArrow = "▲";
                bgColor = "#e74c3c"; // 漲紅色
            } else if (dp < 0) {
                diffArrow = "▼";
                bgColor = "#2ecc71"; // 跌綠色
            }

            // 更新畫面上該標的的所有標籤
            document.querySelectorAll(`span[data-symbol="${s}"]`).forEach(el => {
                el.style.backgroundColor = bgColor; // 動態上色
                const placeholder = el.querySelector('.price-placeholder');
                if (placeholder) {
                    // Math.abs(dp) 用來把負號拿掉，因為前面已經有 ▼ 箭頭了
                    placeholder.innerText = `$${price} (${diffArrow}${Math.abs(dp).toFixed(2)}%)`;
                }
            });
        } else {
            // 如果抓不到股價 (可能是非美股代號)，就把 ... 拿掉，保持灰色
            document.querySelectorAll(`span[data-symbol="${s}"]`).forEach(el => {
                const placeholder = el.querySelector('.price-placeholder');
                if(placeholder) placeholder.innerText = "";
            });
        }
    });
});
</script>
